<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Simulator</title>
  <script type="module" crossorigin src="/solarsystemsim25/assets/index-Dkb8_uz5.js"></script>
  <link rel="stylesheet" crossorigin href="/solarsystemsim25/assets/index-B5_RPlMz.css">
</head>
<body>
    <div id="app" class="app">
        <aside id="infoPanel" class="panel dock-left pinned hidden" aria-label="Info Panel">
            <header id="panelHeader" class="panel-header draggable">
                <h2 id="info-name">Info</h2>
                <div class="panel-actions">
                    <button id="pinBtn" title="Pin panel" aria-pressed="true">📌</button>
                    <button id="info-panel-close" title="Close panel">&times;</button>
                </div>
            </header>
            <div id="panelBody" class="panel-body">
                <section id="edu-section" class="hidden">
                    <div class="edu-header">
                        <img id="edu-thumb" src="" alt="Educational thumbnail" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover;">
                        <div class="edu-title" style="margin-left: 15px;">
                            <p id="edu-short-desc"></p>
                        </div>
                    </div>
                    <div class="edu-actions" style="margin-top: 10px;">
                        <a id="edu-link" class="control-btn" href="#" target="_blank" rel="noopener noreferrer">Read More</a>
                    </div>
                    <div id="edu-source" style="font-size: 0.8em; opacity: 0.7; margin-top: 10px; text-align: right;"></div>
                </section>
                <div id="info-image-container">
                    <!-- Planet image will be added here -->
                </div>
                <div id="info-basic-stats">
                    <!-- Basic stats will be populated here -->
                </div>
                <div id="info-advanced-details" class="hidden">
                    <button id="advanced-details-toggle">Advanced Details</button>
                    <div id="advanced-details-content" class="hidden">
                        <!-- Advanced details will be populated here -->
                    </div>
                </div>
                <div id="info-exact-mode" class="hidden">
                    <button id="exact-mode-toggle" class="control-btn" style="width: 100%; margin-top: 10px;">Show Exact Orbital Data</button>
                    <div id="exact-mode-content" class="hidden" style="padding: 10px; background-color: rgba(0, 0, 0, 0.2); border-radius: 6px; margin-top: 5px; display: grid; grid-template-columns: auto 1fr; gap: 8px 12px;">
                        <!-- Exact orbital elements will be populated here -->
                    </div>
                </div>
            </div>
            <div id="resizer" class="resizer" role="separator" aria-orientation="vertical" aria-label="Resize panel"></div>
        </aside>

        <main id="canvasArea" class="canvas-area">
            <canvas id="bg"></canvas>
            <div id="ui-container">
                <!-- The info-panel is now outside this container. All other UI elements remain. -->
                <div id="controls-panel" class="panel">
                    <button id="reset-btn" class="control-btn">Reset</button>
                    <div class="control-group tooltip">
                        <input type="checkbox" id="shadow-toggle" checked>
                        <label for="shadow-toggle" id="shadow-label">Shadows</label>
                        <span id="shadow-icon">☀️</span>
                        <span class="tooltip-text">Toggle realistic planet shadows. This may affect performance.</span>
                    </div>
                    <div class="control-group">
                        <label for="performance-preset">Quality:</label>
                        <select id="performance-preset" class="control-btn">
                            <option value="auto">Auto</option>
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <button id="manage-presets-btn" class="control-btn">Presets</button>
                </div>
                <div id="visuals-panel" class="panel">
                    <div class="control-group">
                        <input type="checkbox" id="trails-enabled-toggle" checked>
                        <label for="trails-enabled-toggle">Trails</label>
                    </div>
                     <div class="control-group">
                        <label for="trail-length-slider">Length:</label>
                        <input type="range" id="trail-length-slider" min="1" max="3650" value="365" step="1">
                    </div>
                    <div class="control-group">
                        <label for="distance-unit-select">Units:</label>
                        <select id="distance-unit-select" class="control-btn">
                            <option value="au">AU</option>
                            <option value="km">km</option>
                            <option value="earthR">Earth Radii</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="visual-scale-slider" title="0% = Real Scale, 100% = Visual Scale">Scale:</label>
                        <input type="range" id="visual-scale-slider" min="0" max="1" value="0.5" step="0.01">
                    </div>
                </div>
                <div id="time-controls" class="panel">
                    <div id="timestamp-display" style="text-align: center; font-size: 1.2em; margin-bottom: 10px;"></div>
                    <div class="control-group" style="margin-bottom: 5px;">
                        <button id="time-step-backward" class="control-btn" title="Step Backward">|◀</button>
                        <button id="play-pause-btn" class="control-btn" title="Play/Pause">❚❚</button>
                        <button id="time-step-forward" class="control-btn" title="Step Forward">▶|</button>
                        <input type="range" id="time-scale-slider" min="0" max="1" value="0.2" step="0.001" style="flex-grow: 1;">
                        <span id="time-scale-label" style="min-width: 80px; text-align: right;">1.00x</span>
                    </div>
                    <div class="control-group">
                        <button class="control-btn time-preset" data-speed="1">1x</button>
                        <button class="control-btn time-preset" data-speed="100">100x</button>
                        <button class="control-btn time-preset" data-speed="86400">1d/s</button>
                        <button class="control-btn time-preset" data-speed="31557600">1y/s</button>
                    </div>
                    <!-- Time Scrubber will be added later if needed -->
                </div>
                <div id="selection-panel" class="panel">
                    <div id="celestial-selector" class="dropdown">
                <input type="text" id="selector-search-input" class="control-btn" placeholder="Search..." style="width: 100%; margin-bottom: 10px; box-sizing: border-box;">
                <div id="celestial-selector-menu" class="dropdown-menu">
                    <!-- Tree view will be populated by JS -->
                        </div>
                    </div>
                    <button id="free-camera-btn" class="control-btn hidden">Solar System View</button>
                </div>

                <div id="debug-hud" class="panel hidden">
                    <h4>Debug Info</h4>
                    <div>Preset: <span id="debug-preset"></span></div>
                    <div>DPR: <span id="debug-dpr"></span></div>
                    <div>Avg. ms: <span id="debug-avg-ms"></span></div>
                    <div>Scale: <span id="debug-scale"></span></div>
                </div>

                <div id="help-overlay" class="panel hidden">
                    <h3>Keyboard Shortcuts</h3>
                    <div class="help-search-container">
                        <input type="text" id="help-search-input" class="control-btn" placeholder="Search actions...">
                    </div>
                    <div id="shortcuts-list" class="shortcuts-grid">
                        <!-- Shortcut rows will be populated by JS -->
                    </div>
                    <button id="help-overlay-close" class="control-btn" style="margin-top: 15px;">Close</button>
                </div>

                <div id="small-info-card" class="panel hidden" role="region" aria-label="Selected body summary">
                    <img id="card-thumb" src="" alt="Selected body thumbnail" />
                    <div class="card-body">
                        <div id="card-title" class="card-title"></div>
                        <div id="card-stats" class="card-stats"></div>
                        <div class="card-buttons">
                            <button id="btn-frame" title="Frame (F)">Frame</button>
                            <button id="btn-follow" aria-pressed="false">Follow</button>
                            <button id="btn-orbit">Orbit</button>
                        </div>
                    </div>
                </div>

                <button id="help-button" class="control-btn help-btn">?</button>

        <div id="presets-modal" class="panel hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; width: 500px; max-width: 90vw;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">
                <h3>Manage Layout Presets</h3>
                <button id="close-presets-modal-btn" class="control-btn">&times;</button>
            </div>
            <div id="presets-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto;">
                <!-- Preset items will be populated here -->
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <input type="text" id="new-preset-name" class="control-btn" placeholder="New preset name..." style="flex-grow: 1;">
                <button id="save-current-preset-btn" class="control-btn">Save Current</button>
            </div>
        </div>
            </div>
        </main>
    </div>
    <div id="body-tooltip" class="tooltip hidden"></div>
</body>
</html>
