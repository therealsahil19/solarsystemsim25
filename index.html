<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="snap-glow-top" class="snap-glow"></div>
    <div id="snap-glow-right" class="snap-glow"></div>
    <div id="snap-glow-bottom" class="snap-glow"></div>
    <div id="snap-glow-left" class="snap-glow"></div>
    <header id="top-bar">
        <div class="top-bar-section" id="top-bar-left">
            <h1 id="app-title">Solar System Simulator</h1>
        </div>
        <div class="top-bar-section" id="top-bar-center">
            <div id="time-controls">
                <div id="timestamp-display" style="text-align: center; font-size: 1.2em; margin-bottom: 10px;"></div>
                <div id="time-slider-group" class="control-group" style="margin-bottom: 5px;">
                    <button id="time-step-backward" class="control-btn" title="Step Backward">|◀</button>
                    <button id="play-pause-btn" class="control-btn" title="Play/Pause">❚❚</button>
                    <button id="time-step-forward" class="control-btn" title="Step Forward">▶|</button>
                    <div style="position: relative; flex-grow: 1;">
                        <input type="range" id="time-scale-slider" min="0" max="1" value="0.2" step="0.001" style="width: 100%;">
                        <div id="time-scale-tooltip" class="slider-tooltip hidden"></div>
                    </div>
                    <span id="time-scale-label" style="min-width: 80px; text-align: right;">1.00x</span>
                </div>
                <div id="time-presets-group" class="control-group">
                    <button class="control-btn time-preset" data-speed="1">1x</button>
                    <button class="control-btn time-preset" data-speed="100">100x</button>
                    <button class="control-btn time-preset" data-speed="86400">1d/s</button>
                    <button class="control-btn time-preset" data-speed="31557600">1y/s</button>
                </div>
            </div>
        </div>
        <div class="top-bar-section" id="top-bar-right">
            <button id="visuals-toggle-btn" class="control-btn">Visuals</button>
            <button id="settings-toggle-btn" class="control-btn">Settings</button>
            <a id="github-link" href="https://github.com/therealsahil19/solarsystemsim25" target="_blank" rel="noopener noreferrer" title="View project on GitHub">
                GitHub
            </a>
            <div id="more-menu-container">
                <button id="more-menu-toggle" class="control-btn hidden">⋮</button>
                <div id="more-menu-content" class="panel hidden">
                    <!-- This container is now populated by top-bar.ts -->
                </div>
            </div>
        </div>
    </header>

    <div id="app" class="app">
        <aside id="infoPanel" class="panel dock-left pinned hidden" aria-label="Info Panel">
            <header id="panelHeader" class="panel-header">
                <span class="drag-handle draggable">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M9 4h2v16H9zM13 4h2v16h-2z"></path>
                    </svg>
                </span>
                <h2 id="info-name">Info</h2>
                <div class="panel-actions">
                    <button id="pinBtn" class="icon-btn" title="Pin panel" aria-pressed="true" data-testid="info-panel-pin">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M16 3v11.2l-3.5-3.5-3.5 3.5V3h7m2-2H7a2 2 0 0 0-2 2v16l7-7 7 7V3a2 2 0 0 0-2-2z"/></svg>
                    </button>
                    <button id="info-panel-close" class="icon-btn" title="Close panel">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
            </header>
            <div id="panelBody" class="panel-body">
                <div id="info-controls" class="info-controls-container">
                    <div class="pill-buttons">
                        <button id="btn-frame" class="pill-btn" title="Frame (F)">Frame</button>
                        <button id="btn-follow" class="pill-btn" aria-pressed="false" title="Follow (L)">Follow</button>
                        <button id="btn-orbit" class="pill-btn" aria-pressed="true" title="Toggle Orbit (O)">Orbit</button>
                    </div>
                </div>
                <section id="info-main-image-container">
                    <img id="info-image" src="" alt="Image of the selected celestial body">
                    <a id="info-link" href="#" target="_blank" rel="noopener noreferrer">Learn more on Wikipedia</a>
                </section>
                <div id="info-description">
                    <p id="info-short-desc"></p>
                </div>

                <div class="info-section">
                    <h3>Basic Stats</h3>
                    <div id="info-basic-stats" class="stats-grid">
                        <!-- Basic stats will be populated here -->
                    </div>
                </div>

                <div class="info-section">
                    <h3>Orbital Characteristics</h3>
                    <div id="info-orbital-chars" class="stats-grid">
                        <!-- Orbital characteristics will be populated here -->
                    </div>
                </div>

                <div id="info-advanced-details" class="hidden">
                    <button id="advanced-details-toggle" class="btn">Advanced Details</button>
                    <div id="advanced-details-content" class="hidden">
                        <!-- Advanced details will be populated here -->
                    </div>
                </div>
                <div id="info-exact-mode" class="hidden">
                    <button id="exact-mode-toggle" class="btn" style="width: 100%; margin-top: 10px;">Show Exact Orbital Data</button>
                    <div id="exact-mode-content" class="hidden" style="padding: 10px; background-color: rgba(0, 0, 0, 0.2); border-radius: 6px; margin-top: 5px; display: grid; grid-template-columns: auto 1fr; gap: 8px 12px;">
                        <!-- Exact orbital elements will be populated here -->
                    </div>
                </div>
            </div>
            <div id="resizer" class="resizer" role="separator" aria-orientation="vertical" aria-label="Resize panel"></div>
        </aside>

        <main id="canvasArea" class="canvas-area">
            <canvas id="bg"></canvas>
            <div id="ui-container">
                <div id="quick-access-toolbar" class="panel">
                    <!-- Populated by quick-access-toolbar.ts -->
                </div>
                <!-- Pop-out panels for Visuals and Settings -->
                <div id="visuals-panel" class="panel hidden" style="position: absolute; top: 70px; right: 20px; z-index: 101;">
                    <div class="control-group">
                        <input type="checkbox" id="trails-enabled-toggle" checked>
                        <label for="trails-enabled-toggle">Trails</label>
                    </div>
                    <div class="control-group">
                        <label for="trail-length-slider">Length:</label>
                        <input type="range" id="trail-length-slider" min="1" max="3650" value="365" step="1">
                    </div>
                    <div class="control-group">
                        <label for="distance-unit-select">Units:</label>
                        <select id="distance-unit-select" class="btn">
                            <option value="au">AU</option>
                            <option value="km">km</option>
                            <option value="earthR">Earth Radii</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="visual-scale-slider" title="0% = Real Scale, 100% = Visual Scale">Scale:</label>
                        <input type="range" id="visual-scale-slider" min="0" max="1" value="0.5" step="0.01">
                    </div>
                </div>

                <div id="settings-panel" class="panel hidden" style="position: absolute; top: 70px; right: 20px; z-index: 101;">
                    <div class="control-group tooltip">
                        <input type="checkbox" id="shadow-toggle" checked>
                        <label for="shadow-toggle" id="shadow-label">Shadows</label>
                        <span id="shadow-icon">☀️</span>
                        <span class="tooltip-text">Toggle realistic planet shadows. This may affect performance.</span>
                    </div>
                    <div class="control-group">
                        <label for="performance-preset">Quality:</label>
                        <select id="performance-preset" class="control-btn">
                            <option value="auto">Auto</option>
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <button id="reset-btn" class="control-btn">Reset</button>
                    <button id="manage-presets-btn" class="control-btn">Presets</button>
                </div>

                <div id="selection-panel" class="panel">
                    <button id="open-celestial-selector-btn" class="btn">Select Body</button>
                    <button id="free-camera-btn" class="btn hidden">Solar System View</button>
                </div>

                <div id="celestial-selector-panel" class="panel hidden" style="position: absolute; top: 120px; left: calc(50% - 175px); width: 380px; height: 550px; display: flex; flex-direction: column;">
                    <div class="panel-header" style="cursor: grab;">
                        <h2>Select a Celestial Body</h2>
                        <div>
                            <button class="control-btn minimize-btn" title="Minimize">–</button>
                            <button id="close-celestial-selector-btn" class="control-btn" title="Close">&times;</button>
                        </div>
                    </div>
                    <div id="celestial-selector" style="display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; padding: 10px;">
                        <div class="selector-controls" style="padding: 10px; background: rgba(0,0,0,0.1); border-radius: 6px; margin-bottom: 10px;">
                            <div class="control-group" style="justify-content: space-around;">
                                <label style="cursor: pointer; font-weight: 500;"><input type="radio" name="selector-view" value="hierarchy" checked> Hierarchy</label>
                                <label style="cursor: pointer; font-weight: 500;"><input type="radio" name="selector-view" value="type"> By Type</label>
                            </div>
                        </div>
                        <div class="search-container" style="display: flex; gap: 5px; margin-bottom: 10px;">
                            <input type="text" id="selector-search-input" class="btn" placeholder="Search..." style="flex-grow: 1; box-sizing: border-box;">
                        </div>
                        <div id="category-tabs" style="display: flex; margin-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                            <!-- Tabs will be dynamically inserted here -->
                        </div>
                        <div id="celestial-selector-menu" class="dropdown-menu" style="position: relative; width: 100%; box-shadow: none; border: none; background: none; flex-grow: 1; overflow-y: auto;">
                            <!-- Tree view will be populated by JS -->
                        </div>
                    </div>
                </div>

                <div id="contextual-hud" class="panel hidden" style="display: flex; gap: 5px; padding: 8px; transform: translate(-50%, -150%); transition: opacity 0.3s, transform 0.3s;">
                    <button id="hud-frame-btn" class="icon-btn" title="Frame (F)">🎯</button>
                    <button id="hud-follow-btn" class="icon-btn" title="Follow (L)">📡</button>
                    <button id="hud-orbit-btn" class="icon-btn" title="Toggle Orbit (O)">🛰️</button>
                    <button id="hud-info-btn" class="icon-btn" title="Show Info Panel (I)">ℹ️</button>
                </div>

                <div id="debug-hud" class="panel hidden">
                    <h4>Debug Info</h4>
                    <div>Preset: <span id="debug-preset"></span></div>
                    <div>DPR: <span id="debug-dpr"></span></div>
                    <div>Avg. ms: <span id="debug-avg-ms"></span></div>
                    <div>Scale: <span id="debug-scale"></span></div>
                </div>

                <div id="help-overlay" class="panel hidden">
                    <h3>Keyboard Shortcuts</h3>
                    <div class="help-search-container">
                        <input type="text" id="help-search-input" class="btn" placeholder="Search actions...">
                    </div>
                    <div id="shortcuts-list" class="shortcuts-grid">
                        <!-- Shortcut rows will be populated by JS -->
                    </div>
                    <button id="help-overlay-close" class="btn" style="margin-top: 15px;">Close</button>
                </div>

                <div id="small-info-card" class="panel hidden" role="region" aria-label="Selected body summary">
                    <img id="card-thumb" src="" alt="Selected body thumbnail" />
                    <div class="card-body">
                        <div id="card-title" class="card-title"></div>
                        <div id="card-stats" class="card-stats"></div>
                        <div class="card-buttons">
                            <button id="btn-frame" class="btn" title="Frame (F)">Frame</button>
                            <button id="btn-follow" class="btn" aria-pressed="false">Follow</button>
                            <button id="btn-orbit" class="btn">Orbit</button>
                        </div>
                    </div>
                </div>

                <button id="help-button" class="btn help-btn">?</button>

                <div id="presets-modal" class="panel hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; width: 500px; max-width: 90vw;">
                    <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">
                        <h3>Manage Layout Presets</h3>
                        <div>
                            <button class="control-btn minimize-btn">–</button>
                            <button id="close-presets-modal-btn" class="control-btn">&times;</button>
                        </div>
                    </div>
                    <div id="presets-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto;">
                        <!-- Preset items will be populated here -->
                    </div>
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <input type="text" id="new-preset-name" class="control-btn" placeholder="New preset name..." style="flex-grow: 1;">
                        <button id="save-current-preset-btn" class="control-btn">Save Current</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="body-tooltip" class="tooltip hidden"></div>
    <script type="module" src="src/main.ts"></script>
</body>
</html>
