<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg"></canvas>

    <div id="ui-container">
        <div id="info-panel" class="panel hidden">
            <div id="info-panel-header">
                <h2 id="info-name"></h2>
                <button id="info-panel-close">&times;</button>
            </div>
            <div id="info-panel-content">
                <div id="info-image-container">
                    <!-- Planet image will be added here -->
                </div>
                <div id="info-basic-stats">
                    <!-- Basic stats will be populated here -->
                </div>
                <div id="info-advanced-details" class="hidden">
                    <button id="advanced-details-toggle">Advanced Details</button>
                    <div id="advanced-details-content" class="hidden">
                        <!-- Advanced details will be populated here -->
                    </div>
                </div>
            </div>
            <div id="info-panel-resize-handle"></div>
        </div>
        <div id="controls-panel" class="panel">
            <label for="speed-slider">Speed</label>
            <input type="range" id="speed-slider" min="0" max="500" value="50">
            <button id="pause-btn" class="control-btn">Pause</button>
            <button id="reset-btn" class="control-btn">Reset</button>
        </div>
        <div id="selection-panel" class="panel">
            <div id="celestial-selector" class="dropdown">
                <button id="celestial-selector-toggle" class="dropdown-toggle">Select a Body</button>
                <div id="celestial-selector-menu" class="dropdown-menu hidden">
                    <!-- Items will be populated by JS -->
                </div>
            </div>
            <button id="free-camera-btn" class="control-btn hidden">Free Camera</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
